services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nightpulse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_NAME: nightpulse
      DB_USER: postgres
      DB_PASS: postgres
      DB_PORT: "5432"
      DB_SSLMODE: disable
      JWT_SECRET: local-dev-secret-change-in-prod
    depends_on:
      - db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app

volumes:
  pgdata:
