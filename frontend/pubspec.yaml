name: frontend
description: "NightPulse - Real-time clubbing discovery app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  flutter_secure_storage: ^9.2.4

dependency_overrides:
  path_provider_foundation: 2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/clubs/
    - assets/logo/
